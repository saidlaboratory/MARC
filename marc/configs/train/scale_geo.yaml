# R9 geometry-training mix: scale.yaml + the PointChain point-chain geometry family.
# Use with: python3 scripts/train_scale.py --config marc/configs/train/scale_geo.yaml --out-dir checkpoints/scale_geo_D512_L8

training:
  lr_B: 3.0e-5   # 1.0e-4 diverged at D512 (GRPO loss 12.9 -> 1.3e5)

data:
  templates:
    - "LinearSystem2x2"
    - "LinearSystem3x3"
    - "TriangleDistance"
    - "PointSlope"
    - "BilinearSystem"
    - "BilinearProduct"
    - "QuadraticSystem"
    - "CircleLine"
    - "CoupledChain4"
    - "CoupledChain6"
    - "PointChain2"
    - "PointChain3"
    - "PointChain4"
  # AuxRequired_* templates are registered but deliberately NOT in this mix:
  # the aux-required family trains the structure policy, not the value denoiser.
  # Own data dir: the templates differ from scale.yaml, so sharing
  # results/scale/train_data would invalidate the live run's manifest.
  dir: "results/scale_geo/train_data"

checkpointing:
  dir: "checkpoints/scale_geo_D512_L8"
