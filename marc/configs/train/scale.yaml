# Scaling config: D=512, L=8 — Quang P4
# Use with: python3 scripts/train_scale.py --config marc/configs/train/scale.yaml --out-dir checkpoints/scale_D512_L8

training:
  lr_B: 3.0e-5   # 1.0e-4 diverged at D512 (GRPO loss 12.9 -> 1.3e5)

data:
  templates:
    - "LinearSystem2x2"
    - "LinearSystem3x3"
    - "TriangleDistance"
    - "PointSlope"
    - "BilinearSystem"
    - "BilinearProduct"
    - "QuadraticSystem"
    - "CircleLine"
    - "CoupledChain4"
    - "CoupledChain6"
  # AuxRequired_* templates are registered but deliberately NOT in this mix:
  # the aux-required family trains the structure policy, not the value denoiser.
