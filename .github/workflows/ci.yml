name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Reproduce (import modules, fast tests, verify cited numbers)
        run: bash scripts/repro_all.sh verify
